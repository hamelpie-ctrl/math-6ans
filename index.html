<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Math 6 ans</title>

<style>
  body { font-family: system-ui; margin:0; background:#f4f6fb; }
  .wrap { max-width:760px; margin:auto; padding:16px; }
  .card { background:#fff; border-radius:20px; padding:16px; box-shadow:0 8px 20px rgba(0,0,0,.1); text-align:center;}
  .question { font-size:48px; font-weight:900; margin:10px 0; }
  .dotsRow { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .dot { width:18px; height:18px; border-radius:50%; border:2px solid #333; }
  .msg { font-size:22px; min-height:30px; margin-top:8px; }
  .reward { font-size:80px; margin-top:10px; height:90px; }
  .stars { font-size:26px; margin-top:6px; }
  input {
    font-size:24px; padding:10px; width:240px;
    text-align:center; border-radius:12px; border:1px solid #ccc;
  }
  button {
    font-size:20px; padding:10px 14px;
    border-radius:12px; border:0; background:#2f6fed; color:white; margin-top:8px;
  }
  .hint { font-size:14px; color:#556; margin-top:8px; }
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>🧸 Math 6 ans</h1>
    <div class="stars" id="stars">⭐⭐⭐⭐⭐</div>
    <div class="question" id="q">—</div>
    <div class="dotsRow" id="dots"></div>

    <div class="hint">Astuce : utilise le 🎤 du clavier. Dis “douze”, le jeu va écrire 12.</div>

    <!-- IMPORTANT : type="text" pour garder le micro -->
    <input id="answer" type="text" placeholder="Ta réponse">

    <br>
    <button id="checkBtn" type="button">Vérifier</button>

    <div class="msg" id="msg"></div>
    <div class="reward" id="reward"></div>
  </div>
</div>

<script>
  let level = 1, stars = 5, a = 0, b = 0, op = '+', expected = 0;

  const rewards = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🚗","🚀","🦕","🦖","🦄","🐙","🐠"];

  const qEl = document.getElementById('q');
  const msgEl = document.getElementById('msg');
  const dotsEl = document.getElementById('dots');
  const starsEl = document.getElementById('stars');
  const rewardEl = document.getElementById('reward');
  const answerEl = document.getElementById('answer');
  const checkBtn = document.getElementById('checkBtn');

  // --- Dictionnaire FR -> chiffres (jusqu'à 30, facile d'ajouter) ---
  const FR_NUM = new Map([
    ["zéro",0],["zero",0],
    ["un",1],["deux",2],["trois",3],["quatre",4],["cinq",5],
    ["six",6],["sept",7],["huit",8],["neuf",9],["dix",10],
    ["onze",11],["douze",12],["treize",13],["quatorze",14],["quinze",15],["seize",16],
    ["dix sept",17],["dix-sept",17],
    ["dix huit",18],["dix-huit",18],
    ["dix neuf",19],["dix-neuf",19],
    ["vingt",20],["vingt et un",21],["vingt-et-un",21],
    ["vingt deux",22],["vingt-deux",22],
    ["vingt trois",23],["vingt-trois",23],
    ["vingt quatre",24],["vingt-quatre",24],
    ["vingt cinq",25],["vingt-cinq",25],
    ["vingt six",26],["vingt-six",26],
    ["vingt sept",27],["vingt-sept",27],
    ["vingt huit",28],["vingt-huit",28],
    ["vingt neuf",29],["vingt-neuf",29],
    ["trente",30],
  ]);

  function normalize(s){
    return s
      .toLowerCase()
      .trim()
      .replace(/[’']/g, " ")        // apostrophes
      .replace(/\s+/g, " ");        // espaces multiples
  }

  // Convertit la dictée en chiffres: "douze" -> 12, sinon garde seulement les chiffres
  answerEl.addEventListener('input', () => {
    const raw = normalize(answerEl.value);

    if (FR_NUM.has(raw)) {
      answerEl.value = String(FR_NUM.get(raw));
      return;
    }

    // Si Siri écrit "1 2" ou "12," ou "12."
    const digits = raw.replace(/\D+/g, "");
    if (digits !== raw) answerEl.value = digits;
  });

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-CA';
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function maxN(){
    if(level === 1) return 10;
    if(level === 2) return 20;
    if(level === 3) return 30;
    return 50;
  }

  function drawDots(n){
    dotsEl.innerHTML = '';
    for(let i = 0; i < n; i++){
      const d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    }
  }

  function updateStars(){
    starsEl.textContent = '⭐'.repeat(stars);
  }

  function newQuestion(){
    rewardEl.textContent = '';
    msgEl.textContent = '';
    answerEl.value = '';

    const m = maxN();
    op = Math.random() < 0.5 ? '+' : '−';

    a = randInt(0, m);
    b = randInt(0, m);

    if(op === '−' && b > a) [a, b] = [b, a];
    expected = (op === '+') ? (a + b) : (a - b);

    qEl.textContent = `${a} ${op} ${b} = ?`;
    drawDots(op === '+' ? (a + b) : a);

    speak(`${a} ${op === '+' ? 'plus' : 'moins'} ${b}`);
    answerEl.focus();
  }

  function nextLevel(){
    level++;
    stars = 5;
    updateStars();
    msgEl.textContent = "🏆 Nouveau niveau !";
    speak("Nouveau niveau !");
    setTimeout(newQuestion, 900);
  }

  function check(){
    const val = parseInt(answerEl.value, 10);
    if(Number.isNaN(val)) return;

    if(val === expected){
      msgEl.textContent = "Bravo 🎉";
      speak("Bravo !");
      rewardEl.textContent = rewards[randInt(0, rewards.length - 1)];

      stars--;
      updateStars();

      if(stars === 0) nextLevel();
      else setTimeout(newQuestion, 900);
    } else {
      msgEl.textContent = "Essaie encore 🙂";
      speak("Essaie encore");
      answerEl.select();
    }
  }

  checkBtn.addEventListener('click', check);
  answerEl.addEventListener('keydown', (e) => { if(e.key === 'Enter') check(); });

  updateStars();
  newQuestion();
</script>
</body>
</html>
