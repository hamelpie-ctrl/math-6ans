<script>
let level = 1, stars = 5, a, b, op, expected;
const rewards = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🚗","🚀","🦕","🦖","🦄"];

const qEl = document.getElementById('q');
const msgEl = document.getElementById('msg');
const dotsEl = document.getElementById('dots');
const starsEl = document.getElementById('stars');
const rewardEl = document.getElementById('reward');
const answerEl = document.getElementById('answer');
const checkBtn = document.getElementById('checkBtn');

// --- Convertit les mots français en chiffres ---
const wordsToNumbers = {
  "zéro":0,"zero":0,"un":1,"deux":2,"trois":3,"quatre":4,"cinq":5,
  "six":6,"sept":7,"huit":8,"neuf":9,"dix":10,"onze":11,"douze":12,
  "treize":13,"quatorze":14,"quinze":15,"seize":16,
  "dix sept":17,"dix-sept":17,"dix huit":18,"dix-huit":18,
  "dix neuf":19,"dix-neuf":19,"vingt":20,"vingt et un":21,
  "vingt deux":22,"vingt trois":23,"vingt quatre":24,
  "vingt cinq":25,"vingt six":26,"vingt sept":27,
  "vingt huit":28,"vingt neuf":29,"trente":30
};

answerEl.addEventListener('input', () => {
  let txt = answerEl.value.toLowerCase().trim();

  if(wordsToNumbers.hasOwnProperty(txt)){
    answerEl.value = wordsToNumbers[txt];
  } else {
    // garde seulement les chiffres si dictée donne "1 2"
    answerEl.value = txt.replace(/\D+/g, '');
  }
});

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-CA';
  speechSynthesis.speak(u);
}

function rand(n){ return Math.floor(Math.random()*n); }

function drawDots(n){
  dotsEl.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot';
    dotsEl.appendChild(d);
  }
}

function updateStars(){
  starsEl.textContent='⭐'.repeat(stars);
}

function newQ(){
  rewardEl.textContent='';
  msgEl.textContent='';
  answerEl.value='';

  const max = level * 10;
  op = Math.random()<0.5?'+':'−';
  a = rand(max);
  b = rand(max);

  if(op==='−' && b>a){ [a,b] = [b,a]; }

  expected = op==='+' ? a+b : a-b;

  qEl.textContent = `${a} ${op} ${b} = ?`;
  drawDots(op==='+' ? (a+b) : a);

  speak(`${a} ${op==='+'?'plus':'moins'} ${b}`);
}

function nextLevel(){
  level++;
  stars = 5;
  updateStars();
  msgEl.textContent="🏆 Nouveau niveau !";
  speak("Nouveau niveau !");
  setTimeout(newQ,900);
}

function check(){
  const val = parseInt(answerEl.value);
  if(val === expected){
    msgEl.textContent="Bravo 🎉";
    rewardEl.textContent = rewards[rand(rewards.length)];
    speak("Bravo !");
    stars--;
    updateStars();

    if(stars===0) nextLevel();
    else setTimeout(newQ,900);
  } else {
    msgEl.textContent="Essaie encore 🙂";
    speak("Essaie encore");
  }
}

checkBtn.addEventListener('click', check);
answerEl.addEventListener('keydown', e => { if(e.key==='Enter') check(); });

updateStars();
newQ();
</script>
