<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Math 6 ans</title>

<style>
  body { font-family: system-ui; margin:0; background:#f4f6fb; }
  .wrap { max-width:760px; margin:auto; padding:16px; }
  .card { background:#fff; border-radius:20px; padding:16px; box-shadow:0 8px 20px rgba(0,0,0,.1); text-align:center;}
  .question { font-size:48px; font-weight:900; margin:10px 0; }
  .dotsRow { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .dot { width:18px; height:18px; border-radius:50%; border:2px solid #333; }
  .msg { font-size:22px; min-height:30px; margin-top:8px; }
  .reward { font-size:80px; margin-top:10px; height:90px; }
  .stars { font-size:26px; margin-top:6px; }
  input { font-size:24px; padding:10px; width:260px; text-align:center; border-radius:12px; border:1px solid #ccc; }
  button { font-size:20px; padding:10px 14px; border-radius:12px; border:0; background:#2f6fed; color:white; margin-top:8px; }
  .hint { font-size:14px; color:#556; margin-top:8px; }
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>🧸 Math 6 ans</h1>
    <div class="stars" id="stars">⭐⭐⭐⭐⭐</div>
    <div class="question" id="q">—</div>
    <div class="dotsRow" id="dots"></div>

    <div class="hint">
      Touche la case et utilise le 🎤 du clavier. Dis “douze” → 12.
    </div>

    <input id="answer" type="text" placeholder="Ta réponse">
    <br>
    <button id="checkBtn" type="button">Vérifier</button>

    <div class="msg" id="msg"></div>
    <div class="reward" id="reward"></div>
  </div>
</div>

<script>
let level = 1, stars = 5, a, b, op, expected;

const rewards = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🚗","🚀","🦕","🦖","🦄","🐙","🐠"];

const qEl = document.getElementById('q');
const msgEl = document.getElementById('msg');
const dotsEl = document.getElementById('dots');
const starsEl = document.getElementById('stars');
const rewardEl = document.getElementById('reward');
const answerEl = document.getElementById('answer');
const checkBtn = document.getElementById('checkBtn');

const FR_NUM = new Map([
  ["zéro",0],["zero",0],["un",1],["deux",2],["trois",3],["quatre",4],
  ["cinq",5],["six",6],["sept",7],["huit",8],["neuf",9],["dix",10],
  ["onze",11],["douze",12],["treize",13],["quatorze",14],["quinze",15],
  ["seize",16],["dix sept",17],["dix-sept",17],
  ["dix huit",18],["dix-huit",18],
  ["dix neuf",19],["dix-neuf",19],
  ["vingt",20],["vingt et un",21],["vingt-et-un",21],
  ["vingt deux",22],["vingt-deux",22],
  ["vingt trois",23],["vingt-trois",23],
  ["vingt quatre",24],["vingt-quatre",24],
  ["vingt cinq",25],["vingt-cinq",25],
  ["vingt six",26],["vingt-six",26],
  ["vingt sept",27],["vingt-sept",27],
  ["vingt huit",28],["vingt-huit",28],
  ["vingt neuf",29],["vingt-neuf",29],
  ["trente",30]
]);

function normalize(s){
  return (s||"").toLowerCase().trim().replace(/[’']/g," ").replace(/\s+/g," ");
}

function applyDictationFix(){
  const raw = normalize(answerEl.value);

  if(FR_NUM.has(raw)){
    answerEl.value = FR_NUM.get(raw);
    return;
  }

  const digits = raw.replace(/\D+/g,'');
  if(digits.length>0){
    answerEl.value = digits;
  }
}

// Watcher rapide pendant 2s après focus (fix iPad)
let timer=null, endAt=0;
function startWatcher(){
  endAt = Date.now()+2000;
  timer = setInterval(()=>{
    applyDictationFix();
    if(Date.now()>endAt) clearInterval(timer);
  },40);
}
answerEl.addEventListener("focus",startWatcher);
["input","change","keyup","blur"].forEach(e=>{
  answerEl.addEventListener(e,()=>setTimeout(applyDictationFix,0));
});

function speak(t){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='fr-CA';
  speechSynthesis.speak(u);
}

function rand(n){return Math.floor(Math.random()*n);}

function drawDots(n){
  dotsEl.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot';
    dotsEl.appendChild(d);
  }
}

function updateStars(){starsEl.textContent='⭐'.repeat(stars);}

function newQ(){
  rewardEl.textContent='';
  msgEl.textContent='';
  answerEl.value='';

  const max=level*10;
  op=Math.random()<0.5?'+':'−';
  a=rand(max); b=rand(max);
  if(op==='−'&&b>a)[a,b]=[b,a];

  expected=op==='+'?a+b:a-b;

  qEl.textContent=`${a} ${op} ${b} = ?`;
  drawDots(op==='+'?(a+b):a);
  speak(`${a} ${op==='+'?'plus':'moins'} ${b}`);
  answerEl.focus();
}

function nextLevel(){
  level++;
  stars=5;
  updateStars();
  msgEl.textContent="🏆 Nouveau niveau !";
  speak("Nouveau niveau !");
  setTimeout(newQ,1500);
}

function check(){
  applyDictationFix();
  const val=parseInt(answerEl.value);
  if(isNaN(val))return;

  if(val===expected){
    msgEl.textContent="Bravo 🎉";
    rewardEl.textContent=rewards[rand(rewards.length)];
    speak("Bravo !");
    stars--;
    updateStars();

    setTimeout(()=>{
      if(stars===0)nextLevel();
      else newQ();
    },3000);

  }else{
    msgEl.textContent="Essaie encore 🙂";
    speak("Essaie encore");

    setTimeout(()=>answerEl.select(),2000);
  }
}

checkBtn.addEventListener('click',check);
answerEl.addEventListener('keydown',e=>{if(e.key==='Enter')check();});

updateStars();
newQ();
</script>
</body>
</html>
