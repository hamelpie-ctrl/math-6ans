<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Math 6 ans</title>

<style>
  body { font-family: system-ui; margin:0; background:#f4f6fb; }
  .wrap { max-width:760px; margin:auto; padding:16px; }
  .card { background:#fff; border-radius:20px; padding:16px; box-shadow:0 8px 20px rgba(0,0,0,.1); text-align:center;}
  .question { font-size:48px; font-weight:900; margin:10px 0; }
  .dotsRow { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
  .dot { width:18px; height:18px; border-radius:50%; border:2px solid #333; }
  .msg { font-size:22px; min-height:30px; margin-top:8px; }
  .reward { font-size:80px; margin-top:10px; height:90px; }
  .stars { font-size:26px; margin-top:6px; }
  input { font-size:24px; padding:10px; width:260px; text-align:center; border-radius:12px; border:1px solid #ccc; }
  button { font-size:20px; padding:10px 14px; border-radius:12px; border:0; background:#2f6fed; color:white; margin-top:8px; }
  .hint { font-size:14px; color:#556; margin-top:8px; }
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <h1>🧸 Math 6 ans</h1>
    <div class="stars" id="stars">⭐⭐⭐⭐⭐</div>
    <div class="question" id="q">—</div>
    <div class="dotsRow" id="dots"></div>

    <div class="hint">
      Astuce : touche la case, puis 🎤 du clavier. Dis “deux” → 2.
    </div>

    <input id="answer" type="text" placeholder="Ta réponse">
    <br>
    <button id="checkBtn" type="button">Vérifier</button>

    <div class="msg" id="msg"></div>
    <div class="reward" id="reward"></div>
  </div>
</div>

<script>
let level = 1, stars = 5, a, b, op, expected;

const rewards = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🚗","🚀","🦕","🦖","🦄","🐙","🐠"];

const qEl = document.getElementById('q');
const msgEl = document.getElementById('msg');
const dotsEl = document.getElementById('dots');
const starsEl = document.getElementById('stars');
const rewardEl = document.getElementById('reward');
const answerEl = document.getElementById('answer');
const checkBtn = document.getElementById('checkBtn');

const FR_NUM = new Map([
  ["zéro",0],["zero",0],["un",1],["deux",2],["trois",3],["quatre",4],
  ["cinq",5],["six",6],["sept",7],["huit",8],["neuf",9],["dix",10],
  ["onze",11],["douze",12],["treize",13],["quatorze",14],["quinze",15],
  ["seize",16],["dix sept",17],["dix-sept",17],
  ["dix huit",18],["dix-huit",18],
  ["dix neuf",19],["dix-neuf",19],
  ["vingt",20],["vingt et un",21],["vingt-et-un",21],
  ["vingt deux",22],["vingt-deux",22],
  ["vingt trois",23],["vingt-trois",23],
  ["vingt quatre",24],["vingt-quatre",24],
  ["vingt cinq",25],["vingt-cinq",25],
  ["vingt six",26],["vingt-six",26],
  ["vingt sept",27],["vingt-sept",27],
  ["vingt huit",28],["vingt-huit",28],
  ["vingt neuf",29],["vingt-neuf",29],
  ["trente",30]
]);

function normalize(s){
  return (s || "")
    .toLowerCase()
    .trim()
    .replace(/[’']/g," ")
    .replace(/\s+/g," ");
}

let lastValue = "";
function applyDictationFix(){
  const current = answerEl.value;
  if (current === lastValue) return; // rien de nouveau
  lastValue = current;

  const raw = normalize(current);

  if (FR_NUM.has(raw)) {
    answerEl.value = String(FR_NUM.get(raw));
    lastValue = answerEl.value;
    return;
  }

  // Ex: "2." "2 ," "1 2" -> "12"
  const digits = raw.replace(/\D+/g, "");
  if (digits.length > 0 && digits !== current) {
    answerEl.value = digits;
    lastValue = answerEl.value;
  }
}

// --- Mode "réaction rapide" : 2 secondes après focus/tap ---
let fastTimer = null;
let fastEndAt = 0;

function startFastWatch(){
  stopFastWatch();
  fastEndAt = Date.now() + 2000; // 2s
  fastTimer = setInterval(() => {
    applyDictationFix();
    if (Date.now() >= fastEndAt) stopFastWatch();
  }, 40); // rapide => conversion quasi immédiate quand iOS dépose le texte
}

function stopFastWatch(){
  if (fastTimer) clearInterval(fastTimer);
  fastTimer = null;
}

answerEl.addEventListener("focus", () => {
  lastValue = "";
  startFastWatch();
});

// Quand l’utilisateur touche le champ (souvent juste avant dictée)
answerEl.addEventListener("touchstart", () => startFastWatch(), {passive:true});

// Événements classiques (si iOS les envoie)
["input","change","keyup","blur"].forEach(evt=>{
  answerEl.addEventListener(evt, () => setTimeout(applyDictationFix, 0));
});

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-CA';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

function rand(n){ return Math.floor(Math.random()*n); }

function drawDots(n){
  dotsEl.innerHTML='';
  for(let i=0;i<n;i++){
    const d=document.createElement('div');
    d.className='dot';
    dotsEl.appendChild(d);
  }
}

function updateStars(){
  starsEl.textContent='⭐'.repeat(stars);
}

function newQ(){
  rewardEl.textContent='';
  msgEl.textContent='';
  answerEl.value='';
  lastValue = "";

  const max = level * 10;
  op = Math.random()<0.5 ? '+' : '−';
  a = rand(max);
  b = rand(max);
  if(op==='−' && b>a) [a,b]=[b,a];

  expected = op==='+' ? a+b : a-b;

  qEl.textContent = `${a} ${op} ${b} = ?`;
  drawDots(op==='+' ? (a+b) : a);

  speak(`${a} ${op==='+'?'plus':'moins'} ${b}`);
  answerEl.focus();
  startFastWatch();
}

function nextLevel(){
  level++;
  stars = 5;
  updateStars();
  msgEl.textContent="🏆 Nouveau niveau !";
  speak("Nouveau niveau !");
  setTimeout(newQ, 900);
}

function check(){
  applyDictationFix(); // garanti
  const val = parseInt(answerEl.value, 10);
  if(Number.isNaN(val)) return;

  if(val === expected){
    msgEl.textContent="Bravo 🎉";
    rewardEl.textContent = rewards[rand(rewards.length)];
    speak("Bravo !");
    stars--;
    updateStars();
    if(stars === 0) nextLevel();
    else setTimeout(newQ, 900);
  } else {
    msgEl.textContent="Essaie encore 🙂";
    speak("Essaie encore");
    answerEl.select();
  }
}

checkBtn.addEventListener('click', check);
answerEl.addEventListener('keydown', e => { if(e.key==='Enter') check(); });

updateStars();
newQ();
</script>
</body>
</html>
