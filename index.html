<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jeu de maths</title>
<style>
  body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin:0;
    background:#f4f6fb;
    color:#1f2a44;
  }

  .wrap{
    max-width:900px;
    margin:auto;
    padding:16px;
  }

  .card{
    background:#fff;
    border-radius:24px;
    padding:18px;
    box-shadow:0 10px 24px rgba(0,0,0,.10);
    text-align:center;
    position:relative;
    overflow:hidden;
  }

  h1{
    margin:0 0 10px 0;
    font-size:34px;
  }

  h2{
    margin:0 0 10px 0;
    font-size:28px;
  }

  .screen{
    display:none;
  }

  .screen.active{
    display:block;
  }

  .intro{
    font-size:18px;
    color:#4b5d7d;
    margin-bottom:16px;
  }

  .row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:14px;
  }

  input, select, button{
    font-size:20px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid #d1d8e6;
  }

  input[type="text"]{
    width:260px;
    text-align:center;
  }

  .big-btn{
    min-width:180px;
    min-height:64px;
    border:0;
    color:white;
    font-weight:700;
    font-size:22px;
  }

  .add{ background:#2f80ed; }
  .sub{ background:#9b51e0; }
  .mul{ background:#27ae60; }
  .div{ background:#f2994a; }
  .mix{ background:#eb5757; }

  .secondary{
    background:#eaf0fb;
    color:#24324d;
    border:0;
  }

  .primary{
    background:#2f6fed;
    color:white;
    border:0;
    font-weight:700;
  }

  .selected{
    outline:5px solid rgba(0,0,0,.08);
    transform:scale(1.03);
  }

  .question{
    font-size:58px;
    font-weight:900;
    margin:14px 0 10px 0;
  }

  .dotsRow{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
    min-height:28px;
    margin:10px 0;
  }

  .dot{
    width:18px;
    height:18px;
    border-radius:50%;
    border:2px solid #2d3748;
    background:#fff;
  }

  .answerRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
  }

  #answer{
    font-size:28px;
    width:240px;
    text-align:center;
  }

  .msg{
    font-size:26px;
    min-height:40px;
    margin-top:12px;
  }

  .reward{
    font-size:84px;
    min-height:90px;
    margin-top:4px;
  }

  .stats{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:10px;
  }

  .badge{
    background:#eef3ff;
    color:#24324d;
    border-radius:999px;
    padding:8px 14px;
    font-size:18px;
  }

  .top-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:8px;
  }

  .fireworks{
    position:absolute;
    inset:0;
    pointer-events:none;
    display:none;
    overflow:hidden;
  }

  .burst{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    opacity:0;
    animation:explode 1.2s ease-out forwards;
  }

  @keyframes explode{
    0%{
      transform:translate(0,0) scale(.2);
      opacity:1;
    }
    100%{
      transform:translate(var(--dx), var(--dy)) scale(1.8);
      opacity:0;
    }
  }

  .small-note{
    font-size:15px;
    color:#5b6c89;
    margin-top:6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <!-- ÉCRAN D’ACCUEIL -->
    <div id="homeScreen" class="screen active">
      <h1>🧮 Jeu de maths</h1>
      <div class="intro">Choisis ton nom, ton jeu et ton niveau.</div>

      <div class="row">
        <input id="childName" type="text" placeholder="Nom de l’enfant">
      </div>

      <h2>Choisis ton jeu</h2>
      <div class="row">
        <button class="big-btn add" data-mode="add">➕ Addition</button>
        <button class="big-btn sub" data-mode="sub">➖ Soustraction</button>
        <button class="big-btn mul" data-mode="mul">✖️ Multiplication</button>
        <button class="big-btn div" data-mode="div">➗ Division</button>
        <button class="big-btn mix" data-mode="mix">🎲 Mélange</button>
      </div>

      <h2>Choisis ton niveau</h2>
      <div class="row">
        <button class="big-btn secondary level-btn" data-range="0-10">0–10</button>
        <button class="big-btn secondary level-btn" data-range="10-20">10–20</button>
        <button class="big-btn secondary level-btn" data-range="20-50">20–50</button>
      </div>

      <div class="row">
        <button id="playBtn" class="big-btn primary">▶️ Jouer</button>
      </div>

      <div class="small-note">Après 10 bonnes réponses, un feu d’artifice apparaît 🎆</div>
    </div>

    <!-- ÉCRAN DE JEU -->
    <div id="gameScreen" class="screen">
      <div class="top-actions">
        <button id="changeChoicesBtn" class="secondary" type="button">🔁 Changer les choix</button>
        <button id="repeatBtn" class="secondary" type="button">🔊 Répéter</button>
      </div>

      <div class="stats">
        <div class="badge">👤 <span id="playerLabel">Joueur</span></div>
        <div class="badge">🎯 Mode: <span id="modeLabel">Addition</span></div>
        <div class="badge">📚 Niveau: <span id="rangeLabel">0-10</span></div>
        <div class="badge">✅ Bonnes: <span id="okCount">0</span>/10</div>
      </div>

      <div class="question" id="q">—</div>
      <div class="dotsRow" id="dots"></div>

      <div class="answerRow">
        <input id="answer" type="text" placeholder="Réponse">
        <button id="checkBtn" class="primary" type="button">Vérifier</button>
      </div>

      <div class="msg" id="msg"></div>
      <div class="reward" id="reward"></div>
    </div>

    <div class="fireworks" id="fireworks"></div>
  </div>
</div>

<script>
let a = 0;
let b = 0;
let op = '+';
let expected = 0;
let correctCount = 0;
let locked = false;

let selectedMode = 'add';
let selectedRange = '0-10';

const rewards = ["🐶","🐱","🦊","🐼","🐸","🐵","🦁","🐯","🚗","🚀","🦕","🦖","🦄","🐙","🐠","⭐"];
const goodPhrases = ["Bravo","Super","Excellent","Très bien","Génial"];
const retryPhrases = ["Essaie encore","Recommence","Tu es capable","On réessaie"];

const FR_NUM = new Map([
  ["zéro",0],["zero",0],["un",1],["deux",2],["trois",3],["quatre",4],
  ["cinq",5],["six",6],["sept",7],["huit",8],["neuf",9],["dix",10],
  ["onze",11],["douze",12],["treize",13],["quatorze",14],["quinze",15],
  ["seize",16],["dix sept",17],["dix-sept",17],["dix huit",18],["dix-huit",18],
  ["dix neuf",19],["dix-neuf",19],["vingt",20],["vingt et un",21],["vingt-et-un",21],
  ["vingt deux",22],["vingt-deux",22],["vingt trois",23],["vingt-trois",23],
  ["vingt quatre",24],["vingt-quatre",24],["vingt cinq",25],["vingt-cinq",25],
  ["vingt six",26],["vingt-six",26],["vingt sept",27],["vingt-sept",27],
  ["vingt huit",28],["vingt-huit",28],["vingt neuf",29],["vingt-neuf",29],
  ["trente",30],["quarante",40],["cinquante",50]
]);

const homeScreen = document.getElementById('homeScreen');
const gameScreen = document.getElementById('gameScreen');

const childNameEl = document.getElementById('childName');
const playBtn = document.getElementById('playBtn');
const repeatBtn = document.getElementById('repeatBtn');
const changeChoicesBtn = document.getElementById('changeChoicesBtn');

const qEl = document.getElementById('q');
const dotsEl = document.getElementById('dots');
const answerEl = document.getElementById('answer');
const checkBtn = document.getElementById('checkBtn');
const msgEl = document.getElementById('msg');
const rewardEl = document.getElementById('reward');
const okCountEl = document.getElementById('okCount');
const playerLabelEl = document.getElementById('playerLabel');
const modeLabelEl = document.getElementById('modeLabel');
const rangeLabelEl = document.getElementById('rangeLabel');
const fireworksEl = document.getElementById('fireworks');

const modeButtons = document.querySelectorAll('[data-mode]');
const levelButtons = document.querySelectorAll('.level-btn');

function normalize(s){
  return (s || "")
    .toLowerCase()
    .trim()
    .replace(/[’']/g, " ")
    .replace(/\s+/g, " ");
}

function getChildName(){
  return childNameEl.value.trim() || "mon champion";
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'fr-CA';
  u.rate = 0.92;
  speechSynthesis.speak(u);
}

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function parseRange(){
  const [minStr, maxStr] = selectedRange.split('-');
  return { min: parseInt(minStr, 10), max: parseInt(maxStr, 10) };
}

function actualMode(){
  if(selectedMode !== 'mix') return selectedMode;
  const all = ['add','sub','mul','div'];
  return all[randInt(0, all.length - 1)];
}

function modeLabel(mode){
  if(mode === 'add') return 'Addition';
  if(mode === 'sub') return 'Soustraction';
  if(mode === 'mul') return 'Multiplication';
  if(mode === 'div') return 'Division';
  return 'Mélange';
}

function updateLabels(){
  playerLabelEl.textContent = getChildName();
  modeLabelEl.textContent = modeLabel(selectedMode);
  rangeLabelEl.textContent = selectedRange;
}

function showHome(){
  homeScreen.classList.add('active');
  gameScreen.classList.remove('active');
}

function showGame(){
  homeScreen.classList.remove('active');
  gameScreen.classList.add('active');
}

function applyDictationFix(){
  const raw = normalize(answerEl.value);

  if(FR_NUM.has(raw)){
    answerEl.value = String(FR_NUM.get(raw));
    return;
  }

  const digits = raw.replace(/\D+/g, '');
  if(digits.length > 0){
    answerEl.value = digits;
  }
}

let watcher = null;
let watcherEnd = 0;

function startWatcher(){
  stopWatcher();
  watcherEnd = Date.now() + 2000;
  watcher = setInterval(() => {
    applyDictationFix();
    if(Date.now() >= watcherEnd) stopWatcher();
  }, 40);
}

function stopWatcher(){
  if(watcher) clearInterval(watcher);
  watcher = null;
}

function drawDots(n){
  dotsEl.innerHTML = '';
  if(n <= 0 || n > 20) return;
  for(let i = 0; i < n; i++){
    const d = document.createElement('div');
    d.className = 'dot';
    dotsEl.appendChild(d);
  }
}

function speakQuestion(){
  const word =
    op === '+' ? 'plus' :
    op === '−' ? 'moins' :
    op === '×' ? 'fois' :
    'divisé par';

  speak(`${a} ${word} ${b}`);
}

function newQuestion(){
  updateLabels();
  msgEl.textContent = '';
  rewardEl.textContent = '';
  answerEl.value = '';
  answerEl.focus();
  startWatcher();

  const { min, max } = parseRange();
  const mode = actualMode();

  if(mode === 'add'){
    a = randInt(min, max);
    b = randInt(min, max);
    op = '+';
    expected = a + b;
    drawDots(expected <= 20 ? expected : 0);
  }

  if(mode === 'sub'){
    a = randInt(min, max);
    b = randInt(min, max);
    if(b > a) [a, b] = [b, a];
    op = '−';
    expected = a - b;
    drawDots(a <= 20 ? a : 0);
  }

  if(mode === 'mul'){
    const mulMax = max <= 10 ? 10 : (max <= 20 ? 12 : 15);
    a = randInt(0, Math.min(10, mulMax));
    b = randInt(0, Math.min(10, mulMax));
    op = '×';
    expected = a * b;
    drawDots(0);
  }

  if(mode === 'div'){
    const divisor = randInt(1, Math.min(10, max));
    const quotient = randInt(0, Math.min(10, max));
    a = divisor * quotient;
    b = divisor;
    op = '÷';
    expected = quotient;
    drawDots(0);
  }

  qEl.textContent = `${a} ${op} ${b} = ?`;
  speakQuestion();
}

function launchFireworks(){
  fireworksEl.innerHTML = '';
  fireworksEl.style.display = 'block';

  const colors = ['#ff4d4f','#faad14','#36cfc9','#597ef7','#eb2f96','#73d13d'];

  for(let burst = 0; burst < 8; burst++){
    const centerX = randInt(10, 90);
    const centerY = randInt(10, 55);

    for(let i = 0; i < 14; i++){
      const p = document.createElement('div');
      p.className = 'burst';
      p.style.left = centerX + '%';
      p.style.top = centerY + '%';
      p.style.background = colors[randInt(0, colors.length - 1)];
      p.style.setProperty('--dx', randInt(-120, 120) + 'px');
      p.style.setProperty('--dy', randInt(-120, 120) + 'px');
      fireworksEl.appendChild(p);
    }
  }

  setTimeout(() => {
    fireworksEl.style.display = 'none';
    fireworksEl.innerHTML = '';
  }, 1600);
}

function finishSeries(){
  locked = true;
  msgEl.textContent = `🎉 Bravo ${getChildName()} ! Tu as réussi 10 questions !`;
  rewardEl.textContent = '🏆';
  speak(`Bravo ${getChildName()} ! Tu as réussi dix questions !`);
  launchFireworks();

  setTimeout(() => {
    correctCount = 0;
    okCountEl.textContent = correctCount;
    locked = false;
    newQuestion();
  }, 3200);
}

function checkAnswer(){
  if(locked) return;

  applyDictationFix();
  const val = parseInt(answerEl.value, 10);
  if(Number.isNaN(val)) return;

  locked = true;

  if(val === expected){
    correctCount++;
    okCountEl.textContent = correctCount;
    rewardEl.textContent = rewards[randInt(0, rewards.length - 1)];

    const text = `${goodPhrases[randInt(0, goodPhrases.length - 1)]} ${getChildName()} !`;
    msgEl.textContent = text;
    speak(text);

    if(correctCount >= 10){
      setTimeout(finishSeries, 2200);
      return;
    }

    setTimeout(() => {
      locked = false;
      newQuestion();
    }, 2200);

  } else {
    rewardEl.textContent = '';
    const text = `${retryPhrases[randInt(0, retryPhrases.length - 1)]}, ${getChildName()} !`;
    msgEl.textContent = text;
    speak(text);

    setTimeout(() => {
      locked = false;
      answerEl.focus();
      answerEl.select();
    }, 1800);
  }
}

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedMode = btn.dataset.mode;
    modeButtons.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

levelButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedRange = btn.dataset.range;
    levelButtons.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

playBtn.addEventListener('click', () => {
  correctCount = 0;
  okCountEl.textContent = correctCount;
  updateLabels();
  showGame();
  newQuestion();
});

changeChoicesBtn.addEventListener('click', () => {
  showHome();
});

repeatBtn.addEventListener('click', () => {
  speakQuestion();
});

checkBtn.addEventListener('click', checkAnswer);

answerEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') checkAnswer();
});

answerEl.addEventListener('focus', startWatcher);
['input','change','keyup','blur'].forEach(evt => {
  answerEl.addEventListener(evt, () => setTimeout(applyDictationFix, 0));
});

// valeurs par défaut visuelles
document.querySelector('[data-mode="add"]').classList.add('selected');
document.querySelector('[data-range="0-10"]').classList.add('selected');
updateLabels();
</script>
</body>
</html>
