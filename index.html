<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jeu de maths</title>

<style>
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  margin:0;
  background:#f4f6fb;
  color:#1f2a44;
}

.wrap{
  max-width:980px;
  margin:auto;
  padding:14px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:18px 18px 16px;
  box-shadow:0 10px 24px rgba(0,0,0,.10);
  text-align:center;
  position:relative;
  overflow:hidden;
}

.screen{display:none;}
.screen.active{display:block;}

h1{
  margin:0 0 12px 0;
  font-size:32px;
}

h2{
  margin:8px 0 14px 0;
  font-size:26px;
}

.intro{
  font-size:17px;
  color:#4b5d7d;
  margin-bottom:18px;
  line-height:1.4;
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:16px;
}

input,button{
  font-size:19px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid #d1d8e6;
}

input[type="text"]{
  width:250px;
  text-align:center;
}

.big-btn{
  min-width:160px;
  min-height:58px;
  border:0;
  color:#fff;
  font-weight:700;
  font-size:21px;
}

.add{background:#2f80ed;}
.sub{background:#9b51e0;}
.mul{background:#27ae60;}
.div{background:#f2994a;}
.mix{background:#eb5757;}

.primary{
  background:#2f6fed;
  color:#fff;
  border:0;
  font-weight:700;
}

.secondary{
  background:#eaf0fb;
  color:#24324d;
  border:0;
}

.selected{
  outline:5px solid rgba(0,0,0,.08);
  transform:scale(1.03);
}

.top-actions{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.stats{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:6px;
  margin-bottom:10px;
}

.badge{
  background:#eef3ff;
  color:#24324d;
  border-radius:999px;
  padding:7px 12px;
  font-size:16px;
}

.question{
  font-size:54px;
  font-weight:900;
  margin:16px 0 10px 0;
}

.dotsRow{
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
  min-height:24px;
  margin:8px 0 12px 0;
}

.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  border:2px solid #2d3748;
  background:#fff;
}

.answerRow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:10px;
  margin-bottom:8px;
}

#answer{
  font-size:26px;
  width:220px;
  text-align:center;
}

.msg{
  font-size:24px;
  min-height:32px;
  margin-top:10px;
  margin-bottom:2px;
  line-height:1.35;
}

.reward{
  font-size:70px;
  min-height:72px;
  margin-top:0;
  margin-bottom:4px;
}

.collection-box{
  margin-top:8px;
  background:#f8faff;
  border:1px solid #dbe5f6;
  border-radius:18px;
  padding:12px;
}

.collection-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}

.collection-status{
  font-size:15px;
  color:#566684;
  margin-bottom:10px;
  line-height:1.3;
}

.album-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(84px, 1fr));
  gap:8px;
}

.album-card{
  border:1px solid #d8e2f3;
  border-radius:14px;
  padding:8px 4px;
  background:#fff;
  min-height:78px;
}

.album-emoji{
  font-size:30px;
  line-height:1.1;
}

.album-name{
  font-size:13px;
  margin-top:4px;
}

.album-card.locked{
  background:#f1f4fa;
  color:#93a0b6;
}

.album-card.locked .album-emoji{
  filter:grayscale(1);
  opacity:.35;
}

.small-note{
  font-size:14px;
  color:#5b6c89;
  margin-top:6px;
  line-height:1.4;
}

.fireworks{
  position:absolute;
  inset:0;
  pointer-events:none;
  display:none;
  overflow:hidden;
}

.burst{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  opacity:0;
  animation:explode 1.2s ease-out forwards;
}

@keyframes explode{
  0%{
    transform:translate(0,0) scale(.2);
    opacity:1;
  }
  100%{
    transform:translate(var(--dx), var(--dy)) scale(1.8);
    opacity:0;
  }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div id="homeScreen" class="screen active">
      <h1>🧮 Jeu de maths</h1>
      <div class="intro">Choisis ton nom, ton jeu et ton niveau.</div>

      <div class="row">
        <input id="childName" type="text" placeholder="Nom de l’enfant">
      </div>

      <h2>Choisis ton jeu</h2>
      <div class="row">
        <button class="big-btn add" data-mode="add">➕ Addition</button>
        <button class="big-btn sub" data-mode="sub">➖ Soustraction</button>
        <button class="big-btn mul" data-mode="mul">✖️ Multiplication</button>
        <button class="big-btn div" data-mode="div">➗ Division</button>
        <button class="big-btn mix" data-mode="mix">🎲 Mélange</button>
      </div>

      <h2>Choisis ton niveau</h2>
      <div class="row">
        <button class="big-btn secondary level-btn" data-range="0-10">0–10</button>
        <button class="big-btn secondary level-btn" data-range="10-20">10–20</button>
        <button class="big-btn secondary level-btn" data-range="20-50">20–50</button>
      </div>

      <div class="row">
        <button id="playBtn" class="big-btn primary">▶️ Jouer</button>
      </div>

      <div class="small-note">
        Après 10 bonnes réponses, feu d’artifice + progression automatique 🎆<br>
        L’album d’animaux est sauvegardé sur l’iPad.
      </div>
    </div>

    <div id="gameScreen" class="screen">
      <div class="top-actions">
        <button id="changeChoicesBtn" class="secondary" type="button">🔁 Choix</button>
        <button id="repeatBtn" class="secondary" type="button">🔊 Répéter</button>
        <button id="voiceBtn" class="secondary" type="button">🗣️ Changer de voix</button>
        <button id="prevLevelBtn" class="secondary" type="button">⬇️ Niveau</button>
        <button id="nextLevelBtn" class="secondary" type="button">⬆️ Niveau</button>
        <button id="resetAlbumBtn" class="secondary" type="button">🧹 Album</button>
      </div>

      <div class="stats">
        <div class="badge">👤 <span id="playerLabel">Joueur</span></div>
        <div class="badge">🎯 <span id="modeLabel">Addition</span></div>
        <div class="badge">📚 <span id="rangeLabel">0-10</span></div>
        <div class="badge">✅ <span id="okCount">0</span>/10</div>
        <div class="badge">🗣️ <span id="voiceLabel">Voix par défaut</span></div>
      </div>

      <div class="question" id="q">—</div>
      <div class="dotsRow" id="dots"></div>

      <div class="answerRow">
        <input id="answer" type="text" placeholder="Réponse">
        <button id="checkBtn" class="primary" type="button">Vérifier</button>
      </div>

      <div class="msg" id="msg"></div>
      <div class="reward" id="reward"></div>

      <div class="collection-box">
        <div class="collection-title">🐾 Album d’animaux</div>
        <div class="collection-status" id="collectionStatus">0 / 16 trouvés</div>
        <div class="album-grid" id="albumGrid"></div>
      </div>
    </div>

    <div class="fireworks" id="fireworks"></div>
  </div>
</div>

<script>
const STORAGE_KEY = "jeu-maths-album-v2";

let a = 0;
let b = 0;
let op = '+';
let expected = 0;
let correctCount = 0;
let locked = false;

let selectedMode = 'add';
let selectedRange = '0-10';

const rangeOrder = ['0-10', '10-20', '20-50'];

const albumAnimals = [
  { emoji:"🐶", name:"Chien" },
  { emoji:"🐱", name:"Chat" },
  { emoji:"🦊", name:"Renard" },
  { emoji:"🐼", name:"Panda" },
  { emoji:"🐸", name:"Grenouille" },
  { emoji:"🐵", name:"Singe" },
  { emoji:"🦁", name:"Lion" },
  { emoji:"🐯", name:"Tigre" },
  { emoji:"🦄", name:"Licorne" },
  { emoji:"🐙", name:"Pieuvre" },
  { emoji:"🐠", name:"Poisson" },
  { emoji:"🦕", name:"Dinosaure" },
  { emoji:"🦖", name:"Tyrannosaure" },
  { emoji:"🐨", name:"Koala" },
  { emoji:"🐰", name:"Lapin" },
  { emoji:"🦉", name:"Hibou" }
];

let unlockedAnimals = [];

const goodTemplates = [
  "{name}, bravo ! C’est excellent !",
  "Super {name} !",
  "Génial {name} !",
  "{name}, c’est très bien !",
  "Bravo {name}, tu es très fort !"
];

const retryTemplates = [
  "Essaie encore {name}, tu es capable !",
  "Recommence doucement {name}.",
  "On réessaie {name} !",
  "Ce n’est pas grave {name}, essaie encore !"
];

const FR_NUM = new Map([
  ["zéro",0],["zero",0],["un",1],["deux",2],["trois",3],["quatre",4],
  ["cinq",5],["six",6],["sept",7],["huit",8],["neuf",9],["dix",10],
  ["onze",11],["douze",12],["treize",13],["quatorze",14],["quinze",15],
  ["seize",16],["dix sept",17],["dix-sept",17],["dix huit",18],["dix-huit",18],
  ["dix neuf",19],["dix-neuf",19],["vingt",20],["vingt et un",21],["vingt-et-un",21],
  ["vingt deux",22],["vingt-deux",22],["vingt trois",23],["vingt-trois",23],
  ["vingt quatre",24],["vingt-quatre",24],["vingt cinq",25],["vingt-cinq",25],
  ["vingt six",26],["vingt-six",26],["vingt sept",27],["vingt-sept",27],
  ["vingt huit",28],["vingt-huit",28],["vingt neuf",29],["vingt-neuf",29],
  ["trente",30],["quarante",40],["cinquante",50]
]);

let voiceOptions = [];
let currentVoiceIndex = 0;

const homeScreen = document.getElementById('homeScreen');
const gameScreen = document.getElementById('gameScreen');
const childNameEl = document.getElementById('childName');
const playBtn = document.getElementById('playBtn');
const repeatBtn = document.getElementById('repeatBtn');
const changeChoicesBtn = document.getElementById('changeChoicesBtn');
const resetAlbumBtn = document.getElementById('resetAlbumBtn');
const voiceBtn = document.getElementById('voiceBtn');
const prevLevelBtn = document.getElementById('prevLevelBtn');
const nextLevelBtn = document.getElementById('nextLevelBtn');
const qEl = document.getElementById('q');
const dotsEl = document.getElementById('dots');
const answerEl = document.getElementById('answer');
const checkBtn = document.getElementById('checkBtn');
const msgEl = document.getElementById('msg');
const rewardEl = document.getElementById('reward');
const okCountEl = document.getElementById('okCount');
const playerLabelEl = document.getElementById('playerLabel');
const modeLabelEl = document.getElementById('modeLabel');
const rangeLabelEl = document.getElementById('rangeLabel');
const voiceLabelEl = document.getElementById('voiceLabel');
const fireworksEl = document.getElementById('fireworks');
const collectionStatusEl = document.getElementById('collectionStatus');
const albumGridEl = document.getElementById('albumGrid');
const modeButtons = document.querySelectorAll('[data-mode]');
const levelButtons = document.querySelectorAll('.level-btn');

function saveState() {
  try {
    const state = {
      childName: childNameEl.value.trim(),
      selectedMode,
      selectedRange,
      unlockedAnimals,
      currentVoiceIndex
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const state = JSON.parse(raw);

    if (typeof state.childName === "string") childNameEl.value = state.childName;
    if (typeof state.selectedMode === "string") selectedMode = state.selectedMode;
    if (typeof state.selectedRange === "string") selectedRange = state.selectedRange;
    if (Array.isArray(state.unlockedAnimals)) unlockedAnimals = state.unlockedAnimals;
    if (typeof state.currentVoiceIndex === "number") currentVoiceIndex = state.currentVoiceIndex;
  } catch (e) {}
}

function normalize(s){
  return (s || "")
    .toLowerCase()
    .trim()
    .replace(/[’']/g, " ")
    .replace(/\s+/g, " ");
}

function getChildName(){
  return childNameEl.value.trim() || "mon champion";
}

function fillTemplate(list){
  const tpl = list[randInt(0, list.length - 1)];
  return tpl.replaceAll("{name}", getChildName());
}

function getCurrentVoice() {
  if (!voiceOptions.length) return null;
  if (currentVoiceIndex >= voiceOptions.length) currentVoiceIndex = 0;
  return voiceOptions[currentVoiceIndex];
}

function updateVoiceLabel() {
  const v = getCurrentVoice();
  voiceLabelEl.textContent = v ? v.name : "Voix par défaut";
}

function loadVoices() {
  const all = speechSynthesis.getVoices();

  const preferred = all.filter(v =>
    v.lang && (v.lang.toLowerCase().startsWith('fr') || v.lang.toLowerCase().startsWith('en'))
  );

  voiceOptions = preferred.length ? preferred : all;

  if (currentVoiceIndex >= voiceOptions.length) currentVoiceIndex = 0;
  updateVoiceLabel();
}

function cycleVoice() {
  if (!voiceOptions.length) {
    loadVoices();
  }
  if (voiceOptions.length) {
    currentVoiceIndex = (currentVoiceIndex + 1) % voiceOptions.length;
    updateVoiceLabel();
    saveState();
    speak(`Nouvelle voix`);
  }
}

function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = getCurrentVoice();
  if (voice) {
    u.voice = voice;
    u.lang = voice.lang;
  } else {
    u.lang = 'fr-CA';
  }
  u.rate = 0.9;
  u.pitch = 1.08;
  speechSynthesis.speak(u);
}

function randInt(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function parseRange(){
  const [minStr, maxStr] = selectedRange.split('-');
  return { min: parseInt(minStr, 10), max: parseInt(maxStr, 10) };
}

function actualMode(){
  if(selectedMode !== 'mix') return selectedMode;
  const all = ['add','sub','mul','div'];
  return all[randInt(0, all.length - 1)];
}

function modeLabel(mode){
  if(mode === 'add') return 'Addition';
  if(mode === 'sub') return 'Soustraction';
  if(mode === 'mul') return 'Multiplication';
  if(mode === 'div') return 'Division';
  return 'Mélange';
}

function updateLabels(){
  playerLabelEl.textContent = getChildName();
  modeLabelEl.textContent = modeLabel(selectedMode);
  rangeLabelEl.textContent = selectedRange;
  updateVoiceLabel();
}

function updateSelectionsUI() {
  modeButtons.forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.mode === selectedMode);
  });
  levelButtons.forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.range === selectedRange);
  });
}

function showHome(){
  homeScreen.classList.add('active');
  gameScreen.classList.remove('active');
}

function showGame(){
  homeScreen.classList.remove('active');
  gameScreen.classList.add('active');
}

function applyDictationFix(){
  const raw = normalize(answerEl.value);

  if(FR_NUM.has(raw)){
    answerEl.value = String(FR_NUM.get(raw));
    return;
  }

  const digits = raw.replace(/\D+/g, '');
  if(digits.length > 0){
    answerEl.value = digits;
  }
}

let watcher = null;
let watcherEnd = 0;

function startWatcher(){
  stopWatcher();
  watcherEnd = Date.now() + 2000;
  watcher = setInterval(() => {
    applyDictationFix();
    if(Date.now() >= watcherEnd) stopWatcher();
  }, 40);
}

function stopWatcher(){
  if(watcher) clearInterval(watcher);
  watcher = null;
}

function drawDots(n){
  dotsEl.innerHTML = '';
  if(n <= 0 || n > 20) return;
  for(let i = 0; i < n; i++){
    const d = document.createElement('div');
    d.className = 'dot';
    dotsEl.appendChild(d);
  }
}

function speakQuestion(){
  const word =
    op === '+' ? 'plus' :
    op === '−' ? 'moins' :
    op === '×' ? 'fois' :
    'divisé par';

  speak(`${a} ${word} ${b}`);
}

function renderAlbum(){
  albumGridEl.innerHTML = '';

  albumAnimals.forEach(animal => {
    const found = unlockedAnimals.includes(animal.emoji);
    const card = document.createElement('div');
    card.className = 'album-card' + (found ? '' : ' locked');

    const emoji = document.createElement('div');
    emoji.className = 'album-emoji';
    emoji.textContent = found ? animal.emoji : '❔';

    const name = document.createElement('div');
    name.className = 'album-name';
    name.textContent = found ? animal.name : 'Mystère';

    card.appendChild(emoji);
    card.appendChild(name);
    albumGridEl.appendChild(card);
  });

  collectionStatusEl.textContent = `${unlockedAnimals.length} / ${albumAnimals.length} trouvés`;
}

function unlockAnimal(){
  const lockedAnimals = albumAnimals.filter(a => !unlockedAnimals.includes(a.emoji));
  let chosen;

  if(lockedAnimals.length > 0){
    chosen = lockedAnimals[randInt(0, lockedAnimals.length - 1)];
    unlockedAnimals.push(chosen.emoji);
  } else {
    chosen = albumAnimals[randInt(0, albumAnimals.length - 1)];
  }

  renderAlbum();
  saveState();
  return chosen.emoji;
}

function nextRangeValue(){
  const idx = rangeOrder.indexOf(selectedRange);
  return rangeOrder[Math.min(idx + 1, rangeOrder.length - 1)];
}

function previousRangeValue(){
  const idx = rangeOrder.indexOf(selectedRange);
  return rangeOrder[Math.max(idx - 1, 0)];
}

function setRange(newRange){
  selectedRange = newRange;
  updateLabels();
  updateSelectionsUI();
  saveState();
}

function newQuestion(){
  updateLabels();
  msgEl.textContent = '';
  rewardEl.textContent = '';
  answerEl.value = '';
  answerEl.focus();
  startWatcher();

  const { min, max } = parseRange();
  const mode = actualMode();

  if(mode === 'add'){
    a = randInt(min, max);
    b = randInt(min, max);
    op = '+';
    expected = a + b;
    drawDots(expected <= 20 ? expected : 0);
  }

  if(mode === 'sub'){
    a = randInt(min, max);
    b = randInt(min, max);
    if(b > a) [a, b] = [b, a];
    op = '−';
    expected = a - b;
    drawDots(a <= 20 ? a : 0);
  }

  if(mode === 'mul'){
    const mulMax = max <= 10 ? 10 : (max <= 20 ? 12 : 15);
    a = randInt(0, Math.min(10, mulMax));
    b = randInt(0, Math.min(10, mulMax));
    op = '×';
    expected = a * b;
    drawDots(0);
  }

  if(mode === 'div'){
    const divisor = randInt(1, Math.min(10, max));
    const quotient = randInt(0, Math.min(10, max));
    a = divisor * quotient;
    b = divisor;
    op = '÷';
    expected = quotient;
    drawDots(0);
  }

  qEl.textContent = `${a} ${op} ${b} = ?`;
  speakQuestion();
}

function launchFireworks(){
  fireworksEl.innerHTML = '';
  fireworksEl.style.display = 'block';

  const colors = ['#ff4d4f','#faad14','#36cfc9','#597ef7','#eb2f96','#73d13d'];

  for(let burst = 0; burst < 8; burst++){
    const centerX = randInt(10, 90);
    const centerY = randInt(10, 55);

    for(let i = 0; i < 14; i++){
      const p = document.createElement('div');
      p.className = 'burst';
      p.style.left = centerX + '%';
      p.style.top = centerY + '%';
      p.style.background = colors[randInt(0, colors.length - 1)];
      p.style.setProperty('--dx', randInt(-120, 120) + 'px');
      p.style.setProperty('--dy', randInt(-120, 120) + 'px');
      fireworksEl.appendChild(p);
    }
  }

  setTimeout(() => {
    fireworksEl.style.display = 'none';
    fireworksEl.innerHTML = '';
  }, 1600);
}

function finishSeries(){
  locked = true;

  const currentLevel = selectedRange;
  setRange(nextRangeValue());

  let message = `🎉 Bravo ${getChildName()} ! Tu as réussi 10 questions !`;
  if(currentLevel !== selectedRange){
    message += ` Nouveau niveau : ${selectedRange} !`;
  } else {
    message += ` Tu restes au niveau ${selectedRange}.`;
  }

  if(unlockedAnimals.length === albumAnimals.length){
    message += ` En plus, ton album est complet !`;
  }

  msgEl.textContent = message;
  rewardEl.textContent = '🏆';
  speak(message);
  launchFireworks();

  setTimeout(() => {
    correctCount = 0;
    okCountEl.textContent = correctCount;
    locked = false;
    newQuestion();
  }, 5000);
}

function checkAnswer(){
  if(locked) return;

  applyDictationFix();
  const val = parseInt(answerEl.value, 10);
  if(Number.isNaN(val)) return;

  locked = true;

  if(val === expected){
    correctCount++;
    okCountEl.textContent = correctCount;

    const animal = unlockAnimal();
    rewardEl.textContent = animal;

    const text = fillTemplate(goodTemplates);
    msgEl.textContent = text;
    speak(text);

    if(correctCount >= 10){
      setTimeout(finishSeries, 5000);
      return;
    }

    setTimeout(() => {
      locked = false;
      newQuestion();
    }, 5000);

  } else {
    rewardEl.textContent = '';
    const text = fillTemplate(retryTemplates);
    msgEl.textContent = text;
    speak(text);

    setTimeout(() => {
      locked = false;
      answerEl.focus();
      answerEl.select();
    }, 3000);
  }
}

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedMode = btn.dataset.mode;
    updateSelectionsUI();
    saveState();
  });
});

levelButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedRange = btn.dataset.range;
    updateSelectionsUI();
    saveState();
  });
});

playBtn.addEventListener('click', () => {
  correctCount = 0;
  okCountEl.textContent = correctCount;
  updateLabels();
  saveState();
  showGame();
  newQuestion();
});

changeChoicesBtn.addEventListener('click', () => {
  saveState();
  showHome();
});

repeatBtn.addEventListener('click', () => {
  speakQuestion();
});

voiceBtn.addEventListener('click', () => {
  cycleVoice();
});

prevLevelBtn.addEventListener('click', () => {
  setRange(previousRangeValue());
  msgEl.textContent = `Niveau changé : ${selectedRange}`;
  rewardEl.textContent = '';
  speak(`Niveau ${selectedRange}`);
  correctCount = 0;
  okCountEl.textContent = correctCount;
  if (gameScreen.classList.contains('active')) {
    newQuestion();
  }
});

nextLevelBtn.addEventListener('click', () => {
  setRange(nextRangeValue());
  msgEl.textContent = `Niveau changé : ${selectedRange}`;
  rewardEl.textContent = '';
  speak(`Niveau ${selectedRange}`);
  correctCount = 0;
  okCountEl.textContent = correctCount;
  if (gameScreen.classList.contains('active')) {
    newQuestion();
  }
});

resetAlbumBtn.addEventListener('click', () => {
  unlockedAnimals = [];
  renderAlbum();
  saveState();
  msgEl.textContent = "Album réinitialisé.";
  rewardEl.textContent = '';
  speak("Album réinitialisé.");
});

checkBtn.addEventListener('click', checkAnswer);

answerEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') checkAnswer();
});

answerEl.addEventListener('focus', startWatcher);
['input','change','keyup','blur'].forEach(evt => {
  answerEl.addEventListener(evt, () => setTimeout(applyDictationFix, 0));
});

childNameEl.addEventListener('input', () => {
  updateLabels();
  saveState();
});

if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

loadState();
updateSelectionsUI();
updateLabels();
renderAlbum();
</script>
</body>
</html>
